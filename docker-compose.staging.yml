# Configuration pour le staging
# Usage: docker-compose -f docker-compose.yml -f docker-compose.staging.yml up -d

services:
  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8007 --workers 2
    environment:
      - ENVIRONMENT=staging
      - NODE_ENV=production
      - DEV=false
      - DEBUG=false
      - AUTO_RELOAD=false
      - LOG_LEVEL=INFO
      - SOLR_BASE_URL=https://solr-staging.openedition.org/solr/documents
    ports: !override
      - "8000:8007"
    volumes: !reset []

  frontend:
    build:
      args:
        NEXT_PUBLIC_API_URL: /api
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - INTERNAL_API_URL=http://api:8007
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    ports: !reset []

  nginx:
    image: nginx:alpine
    container_name: search-next_nginx_staging
    ports:
      - "8080:80"
    volumes:
      - ./search_api_solr/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./search_api_solr/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    networks:
      - search-next_network

  postgres:
    ports: !reset []

  redis:
    ports: !reset []

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local

networks:
  search-next_network:
    driver: bridge
