# Configuration pour la production
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8007 --workers 4
    environment:
      - ENVIRONMENT=production
      - NODE_ENV=production
      - DEV=false
      - DEBUG=false
      - AUTO_RELOAD=false
      - LOG_LEVEL=INFO
      - SOLR_BASE_URL=https://solrslave-sec.labocleo.org/solr/documents
    ports: !reset []
    volumes: !reset []

  frontend:
    build:
      args:
        NEXT_PUBLIC_API_URL: /api
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - INTERNAL_API_URL=http://api:8007
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    ports: !reset []

  # Reverse proxy Nginx (optionnel pour la production)
  nginx:
    image: nginx:alpine
    container_name: search-next_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./search_api_solr/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./search_api_solr/nginx/conf.d:/etc/nginx/conf.d:ro
      # - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    networks:
      - search-next_network

  postgres:
    ports: !reset []

  redis:
    ports: !reset []

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local

networks:
  search-next_network:
    driver: bridge
