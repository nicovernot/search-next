version: '3.8'

# Configuration pour la production
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8007 --workers 4
    environment:
      - DEV=false
      - LOG_LEVEL=INFO
      - SOLR_BASE_URL=https://solrslave-sec.labocleo.org/solr/documents
    # Ne pas monter le volume en production
    volumes: []

  frontend:
    build:
      args:
        REACT_APP_API_URL: https://api.votre-domaine.com
    ports:
      - "80:80"
      - "443:443"
    # Ajouter les volumes pour SSL si nécessaire
    # volumes:
    #   - ./certs:/etc/nginx/certs:ro

    # Reverse proxy Nginx (optionnel pour la production)
  nginx:
    image: nginx:alpine
    container_name: openedition_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./search_api_solr/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./search_api_solr/nginx/conf.d:/etc/nginx/conf.d:ro
      # - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    networks:
      - openedition_network
