services:
  # API Backend FastAPI
  # Utilise Solr distant : https://solrslave-sec.labocleo.org/solr/documents
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: search-next_api
    ports:
      - "8007:8007"
    env_file:
      - search_api_solr/.env.local
    environment:
      - SOLR_BASE_URL=https://solrslave-sec.labocleo.org/solr/documents
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://search_user:search_password@postgres:5432/search_db
    volumes:
      # Volume pour le développement (hot reload)
      - ./search_api_solr:/app
      # Exclure les répertoires Python cache
      - /app/__pycache__
      - /app/.pytest_cache
      - ./search_api_solr/.env:/app/.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8007 --reload
    restart: unless-stopped
    depends_on:
      - redis
      - postgres
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8007/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - openedition_network

  # Postgres DB pour comptes utilisateurs
  postgres:
    image: postgres:15-alpine
    container_name: search-next_postgres
    environment:
      - POSTGRES_USER=search_user
      - POSTGRES_PASSWORD=search_password
      - POSTGRES_DB=search_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U search_user -d search_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openedition_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: search-next_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - openedition_network

  # Frontend Next.js
  search_next:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8007
    container_name: search_next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8007
      - HOSTNAME=0.0.0.0
    ports:
      - "3009:3000"
    restart: unless-stopped
    depends_on:
      - api
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - openedition_network

  # Frontend Next.js en mode développement (hot-reload)
  search_next_dev:
    image: node:20-alpine
    container_name: search_next_dev
    working_dir: /app
    ports:
      - "3007:3000"
    volumes:
      - ./front:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8007
      - HOSTNAME=0.0.0.0
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - openedition_network

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local

networks:
  openedition_network:
    driver: bridge
