services:
  # API Backend FastAPI
  # Utilise Solr distant : https://solrslave-sec.labocleo.org/solr/documents
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: search_api_solr
    ports:
      - "8007:8007"
    env_file:
      - search_api_solr/.env.local
    environment:
      - SOLR_BASE_URL=https://solrslave-sec.labocleo.org/solr/documents
      - REDIS_URL=redis://redis:6379/0
    volumes:
      # Volume pour le développement (hot reload)
      - ./search_api_solr:/app
      # Exclure les répertoires Python cache
      - /app/__pycache__
      - /app/.pytest_cache
      - ./search_api_solr/.env:/app/.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8007 --reload
    restart: unless-stopped
    depends_on:
      - redis
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8007/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - openedition_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: openedition_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - openedition_network

  # Frontend React
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:8007
    env_file:
      - .env.shared
      - .env.development
      - front/.env.local
    container_name: openedition_frontend
    ports:
      - "3009:80"
    restart: unless-stopped
    depends_on:
      - api
      - redis
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/" ]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - openedition_network
  # Frontend en mode développement (optionnel, décommentez pour utiliser)
  # frontend-dev:
  #   image: node:18-alpine
  #   container_name: openedition_frontend_dev
  #   working_dir: /app
  #   ports:
  #     - "3000:3000"
  #   volumes:
  #     - ./front:/app
  #     - /app/node_modules
  #   environment:
  #     - REACT_APP_API_URL=http://localhost:8007
  #     - CHOKIDAR_USEPOLLING=true
  #   command: sh -c "npm install && npm start"
  #   restart: unless-stopped
  #   depends_on:
  #     - api
  #   networks:
  #     - openedition_network

volumes:
  redis_data:
    driver: local

networks:
  openedition_network:
    driver: bridge
