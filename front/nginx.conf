server {
    listen 80;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Redirection de la racine vers /search
    location = / {
        return 301 $scheme://$http_host/search/;
    }

    # Gestion des assets statiques AVANT la location /search
    location ~* ^/search/static/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        # Supprimer le préfixe /search pour accéder aux vrais fichiers
        rewrite ^/search/(.*)$ /$1 break;
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
    }

    # Gestion des autres assets (favicon, manifest, etc.)
    location ~* ^/search/.*\.(ico|json|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        rewrite ^/search/(.*)$ /$1 break;
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
    }

    # Configuration pour l'application React sur /search
    location /search {
        alias /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
    }
}
